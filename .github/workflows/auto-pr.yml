name: Auto Create PR

on:
  push:
    branches:
      - notes-sync

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "auto update notes"
          branch: notes-sync
          base: main
          title: "Auto sync notes"
          body: "Auto PR from Obsidian Git"
